<!DOCTYPE html>
<html lang="pt-BR">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>4D Polytope Visualizer</title>
     <link rel="icon" type="image/png" href="./solid_fav_icon.png">
     <link rel="stylesheet" href="./assets/css/main.css" />
</head>

<body>

     <div id="info">
          <span id="shape-name">Tesseract</span><br />
          <span id="shape-sub">Hypercube 4D · 16 verts · 32 edges</span><br />
          Rotations: XY, XW, YZ, ZW
     </div>

     <div id="shape-nav"></div>

     <!-- Controls panel -->
     <div id="controls">
          <div class="ctrl-title">PROJECTION</div>
          <div id="proj-toggle">
               <button class="ctrl-btn active" id="btn-perspective">Perspective</button>
               <button class="ctrl-btn" id="btn-ortho">Orthographic</button>
          </div>

          <div class="ctrl-title" style="margin-top:14px;">SHADOW PROJ.</div>
          <button class="ctrl-btn" id="btn-shadow" style="width:100%;">OFF</button>

          <div class="ctrl-title" style="margin-top:14px;">ROTATION 4D</div>
          <div id="matrix-display"></div>
     </div>

     <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
     <script src="./assets/js/main.js"></script>

</body>

</html>
